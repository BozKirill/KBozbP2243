name: 01_01_02_24_hello_world

on:
  push:
    branches:
      - main

env:
  TASK_FOLDER: "${{ github.workspace }}"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Pull selenoid containers
        run: |
          docker pull selenoid/vnc_chrome:128.0
          docker pull selenoid/video-recorder:latest-release

      - name: Run selenoid in Docker container
        run: |
          docker compose -f docker-compose.yml up -d

      - name: Wait for container to start
        run: sleep 5

      - name: Wait selenoid status
        run: |
          timeout 60 bash -c 'until curl -f http://127.0.0.1:4444/status; do sleep 2; done'
          echo "Selenoid is ready!"

      - name: Build with Maven
        run: mvn test

      # -------------------------
      # Copy video from container
      # -------------------------
      - name: Copy videos from selenoid
        if: always()
        run: |
          mkdir -p video
          docker cp demoqa-selenoid-1:/opt/selenoid/video/. ./video || true
          echo "Video directory contents:"
          ls -lah ./video || true

      # -------------------------
      # Copy logs from container
      # -------------------------
      - name: Copy logs from selenoid
        if: always()
        run: |
          mkdir -p logs
          docker cp demoqa-selenoid-1:/opt/selenoid/logs/. ./logs || true
          echo "Logs directory contents:"
          ls -lah ./logs || true

      # -------------------------
      # Show container logs
      # -------------------------
      - name: Show Selenoid logs
        if: always()
        run: |
          echo "Selenoid logs:"
          docker logs demoqa-selenoid-1 | tail -200

      # -------------------------
      # Upload test report
      # -------------------------
      - name: Uploading report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: ./target/surefire-reports/html
          if-no-files-found: warn

      # -------------------------
      # Upload video
      # -------------------------
      - name: Uploading video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: ./video/*.mp4
          if-no-files-found: warn

      # -------------------------
      # Upload logs
      # -------------------------
      - name: Uploading logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: ./logs
          if-no-files-found: warn

#      - name: Setup tmate session
