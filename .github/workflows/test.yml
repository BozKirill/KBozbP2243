name: 01_01_02_24_hello_world

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Prepare folders (video/logs)
        run: |
          mkdir -p video logs
          chmod -R 777 video logs || true
          ls -lah

      - name: Pull browser and video recorder images
        run: |
          docker pull selenoid/vnc_chrome:128.0
          docker pull selenoid/video-recorder:latest-release
          docker pull aerokube/selenoid:latest-release
          docker pull aerokube/selenoid-ui:latest-release

      - name: Run selenoid (docker compose)
        run: |
          docker compose -f docker-compose.yml up -d
          docker ps -a

      - name: Wait selenoid status
        run: |
          timeout 90 bash -c 'until curl -fsS http://127.0.0.1:4444/status >/dev/null; do echo "waiting..."; sleep 2; done'
          echo "Selenoid is ready!"

      - name: Build with Maven
        run: mvn -e test

      # --- Debug: show what selenoid has in /opt/selenoid/video ---
      - name: Debug video folder inside selenoid
        if: always()
        run: |
          echo "Inside container /opt/selenoid/video:"
          docker ps
          docker exec selenoid ls -lah /opt/selenoid/video || true
          echo "Inside container /opt/selenoid/logs:"
          docker exec selenoid ls -lah /opt/selenoid/logs || true

      # Если видео не смонтировалось (или на всякий случай) — копируем из контейнера
      - name: Copy videos from selenoid
        if: always()
        run: |
          mkdir -p video
          docker cp selenoid:/opt/selenoid/video/. ./video || true
          echo "Video directory contents on runner:"
          ls -lah ./video || true

      - name: Copy logs from selenoid
        if: always()
        run: |
          mkdir -p logs
          docker cp selenoid:/opt/selenoid/logs/. ./logs || true
          echo "Logs directory contents on runner:"
          ls -lah ./logs || true

      - name: Show Selenoid logs
        if: always()
        run: |
          echo "Selenoid logs:"
          docker logs selenoid | tail -300 || true

      - name: Uploading report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: ./target/surefire-reports
          if-no-files-found: warn

      - name: Uploading video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: ./video
          if-no-files-found: warn

      - name: Uploading logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: ./logs
          if-no-files-found: warn